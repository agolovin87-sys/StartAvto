<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <title>Яндекс Карты 3.0 — точная геолокация (браузер)</title>
    <!--
      ВАЖНО:
      • ymaps.geolocation.get({ provider: 'browser' }) существует в JS API 2.1, не в 3.0.
      • В API 3.0 для точности «как GPS» используйте Geolocation API браузера (enableHighAccuracy)
        или кнопку YMapGeolocationControl (под капотом — тот же браузерный API).
      • Геолокация в браузере требует HTTPS (исключение: localhost / 127.0.0.1).
      Замените YOUR_API_KEY на ключ JavaScript API из кабинета Яндекса.
    -->
    <script
      src="https://api-maps.yandex.ru/v3/?apikey=YOUR_API_KEY&lang=ru_RU"
      type="text/javascript"
    ></script>
    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: system-ui, sans-serif;
      }
      #map {
        height: calc(100% - 56px);
      }
      #geo-status {
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.45;
        background: #1e293b;
        color: #e2e8f0;
        min-height: 32px;
      }
      #geo-status.error {
        background: #7f1d1d;
        color: #fecaca;
      }
      #geo-status.ok {
        background: #14532d;
        color: #bbf7d0;
      }
    </style>
  </head>
  <body>
    <div id="geo-status" role="status">Инициализация карты…</div>
    <div id="map"></div>

    <script>
      (function () {
        const statusEl = document.getElementById("geo-status");

        function setStatus(text, kind) {
          statusEl.textContent = text;
          statusEl.classList.remove("error", "ok");
          if (kind) statusEl.classList.add(kind);
        }

        function isSecureContextForGeo() {
          if (typeof window.isSecureContext === "boolean") return window.isSecureContext;
          const h = location.hostname;
          if (h === "localhost" || h === "127.0.0.1") return true;
          return location.protocol === "https:";
        }

        /** В API 3.0 координаты: [долгота, широта] */
        function toLngLat(lat, lng) {
          return [lng, lat];
        }

        function geoErrorMessage(err) {
          if (!err) return "Не удалось получить координаты.";
          if (err.code === 1) return "Доступ к геолокации запрещён. Разрешите доступ в настройках сайта для этого адреса.";
          if (err.code === 2) return "Позиция недоступна. Включите службы геолокации / сеть, на смартфоне — GPS.";
          if (err.code === 3) return "Истекло время ожидания. Попробуйте на улице с включённой точной геолокацией.";
          return err.message || "Ошибка геолокации.";
        }

        function getNavigatorPosition(options) {
          return new Promise(function (resolve, reject) {
            if (!navigator.geolocation) {
              reject(new Error("BROWSER_UNSUPPORTED"));
              return;
            }
            navigator.geolocation.getCurrentPosition(resolve, reject, options);
          });
        }

        async function main() {
          if (!isSecureContextForGeo()) {
            setStatus(
              "Откройте страницу по HTTPS (или localhost). Иначе браузер не даст точную геолокацию.",
              "error"
            );
            return;
          }

          await ymaps3.ready;

          ymaps3.import.registerCdn(
            "https://cdn.jsdelivr.net/npm/{package}",
            "@yandex/ymaps3-default-ui-theme@0.0"
          );

          const {
            YMap,
            YMapDefaultSchemeLayer,
            YMapFeatureDataSource,
            YMapLayer,
            YMapMarker,
            YMapCollection,
            YMapControls,
          } = ymaps3;

          const { YMapZoomControl } = await ymaps3.import("@yandex/ymaps3-default-ui-theme");

          const startCenter = [37.6173, 55.7558];
          const startZoom = 11;

          const markerSourceId = "user-geo-source";
          const collection = new YMapCollection();

          const map = new YMap(
            document.getElementById("map"),
            {
              location: { center: startCenter, zoom: startZoom },
              showScaleInCopyrights: true,
            },
            [
              new YMapDefaultSchemeLayer({}),
              new YMapFeatureDataSource({ id: markerSourceId }),
              new YMapLayer({ source: markerSourceId, type: "markers" }),
              new YMapControls({ position: "right" }).addChild(new YMapZoomControl({})),
              collection,
            ]
          );

          let markerEntity = null;

          function removeMarker() {
            if (markerEntity && collection) {
              try {
                collection.removeChild(markerEntity);
              } catch (e) {
                /* */
              }
            }
            markerEntity = null;
          }

          function flyTo(lng, lat, zoom) {
            const loc = {
              center: [lng, lat],
              zoom: zoom,
              duration: 700,
              easing: "ease-in-out",
            };
            if (typeof map.update === "function") {
              map.update({ location: loc });
            }
          }

          function addMarkerAt(lng, lat) {
            removeMarker();
            const el = document.createElement("div");
            el.style.cssText =
              "width:22px;height:22px;border-radius:50%;background:#38bdf8;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);";
            markerEntity = new YMapMarker(
              {
                coordinates: [lng, lat],
                source: markerSourceId,
              },
              el
            );
            collection.addChild(markerEntity);
          }

          function applyBrowserPosition(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const acc = typeof pos.coords.accuracy === "number" ? pos.coords.accuracy : null;
            const zoom = acc != null && acc > 800 ? 13 : acc != null && acc > 200 ? 14 : 16;
            flyTo(lng, lat, zoom);
            addMarkerAt(lng, lat);
            const accText = acc != null ? " ±" + Math.round(acc) + " м" : "";
            setStatus("Координаты (WGS84): " + lat.toFixed(6) + ", " + lng.toFixed(6) + accText, "ok");
          }

          const geoOpts = {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 90000,
          };

          try {
            const pos = await getNavigatorPosition(geoOpts);
            applyBrowserPosition(pos);
          } catch (err) {
            if (err && err.message === "BROWSER_UNSUPPORTED") {
              setStatus("Браузер не поддерживает геолокацию.", "error");
              return;
            }
            if (err && err.code !== undefined) {
              setStatus(geoErrorMessage(err), "error");
            } else {
              setStatus(geoErrorMessage(null), "error");
            }
          }
        }

        main().catch(function (e) {
          setStatus("Ошибка карты: " + (e && e.message ? e.message : String(e)), "error");
        });
      })();
    </script>
  </body>
</html>
