<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Простая геолокация — Яндекс.Карты API 2.1</title>
    <!-- Ключ подставляется при npm run build из VITE_YANDEX_MAPS_API_KEY -->
    <script
      src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU"
      type="text/javascript"
    ></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      #toolbar {
        flex-shrink: 0;
        z-index: 1000;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
      }
      #toolbar button {
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
      }
      #toolbar button:hover {
        background: #f5f5f5;
      }
      #platform {
        align-self: center;
        margin-left: auto;
        font-size: 12px;
        color: #555;
      }
      #status {
        width: 100%;
        font-size: 13px;
        color: #333;
        min-height: 1.2em;
      }
      #status.error {
        color: #c00;
      }
      #map {
        flex: 1;
        min-height: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button type="button" id="btnRetry">Повторить попытку</button>
      <button type="button" id="btnManual">Выбрать на карте вручную</button>
      <span id="platform"></span>
      <div id="status"></div>
    </div>
    <div id="map"></div>

    <script>
      (function () {
        var myMap = null;
        var placemark = null;
        var manualPickActive = false;
        var mapClickHandler = null;

        var GEO_OPTIONS = {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0,
        };

        function log(step, detail) {
          var msg = "[geo-simple] " + step;
          if (detail !== undefined) {
            msg += " | " + (typeof detail === "object" ? JSON.stringify(detail) : String(detail));
          }
          console.log(msg);
        }

        function detectPlatformLabel() {
          var ua = navigator.userAgent || "";
          log("userAgent", ua);
          var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
          var isAndroid = /Android/i.test(ua);
          if (isIOS) {
            log("platform", "iOS (или iPadOS)");
            return "Платформа: iOS / iPadOS";
          }
          if (isAndroid) {
            log("platform", "Android");
            return "Платформа: Android";
          }
          log("platform", "другое (не iOS/Android по UA)");
          return "Платформа: другое";
        }

        function setStatus(text, isError) {
          var el = document.getElementById("status");
          el.textContent = text || "";
          el.className = isError ? "error" : "";
          log("status", text || "(пусто)");
        }

        function geoErrorMessage(err) {
          if (!err || typeof err.code !== "number") {
            log("geoError", "неизвестная ошибка");
            return "Не удалось получить местоположение";
          }
          log("geoError.code", err.code);
          if (err.code === 1) {
            return "Разрешите доступ к геолокации в браузере";
          }
          if (err.code === 2) {
            return "Не удалось определить местоположение. Попробуйте выйти на улицу";
          }
          if (err.code === 3) {
            return "Поиск местоположения занял слишком много времени. Попробуйте ещё раз";
          }
          return "Не удалось получить местоположение";
        }

        function removePlacemark() {
          if (placemark && myMap) {
            log("placemark", "удаление предыдущей метки");
            myMap.geoObjects.remove(placemark);
            placemark = null;
          }
        }

        function addPlacemarkAt(coords, accuracyMeters, title) {
          removePlacemark();
          var balloonText;
          if (title) {
            balloonText = title;
          } else if (typeof accuracyMeters === "number" && !isNaN(accuracyMeters)) {
            balloonText = "Точность: ±" + Math.round(accuracyMeters) + " м";
          } else {
            balloonText = "Метка";
          }
          log("placemark.create", { coords: coords, balloon: balloonText });
          placemark = new ymaps.Placemark(
            coords,
            { balloonContent: balloonText },
            { preset: "islands#blueCircleIcon" }
          );
          myMap.geoObjects.add(placemark);
          myMap.setCenter(coords, myMap.getZoom() || 15, { duration: 300 });
          placemark.balloon.open();
          log("placemark", "добавлено на карту, балун открыт");
        }

        function requestGeolocation() {
          if (!myMap) {
            log("getCurrentPosition", "пропуск — карта ещё не готова");
            return;
          }
          if (!navigator.geolocation) {
            log("getCurrentPosition", "navigator.geolocation недоступен");
            setStatus("Геолокация не поддерживается браузером", true);
            return;
          }

          setStatus("Определяем местоположение…");
          log("getCurrentPosition", "вызов с опциями " + JSON.stringify(GEO_OPTIONS));

          navigator.geolocation.getCurrentPosition(
            function (pos) {
              var lat = pos.coords.latitude;
              var lon = pos.coords.longitude;
              var acc = pos.coords.accuracy;
              log("getCurrentPosition.success", {
                latitude: lat,
                longitude: lon,
                accuracy: acc,
                timestamp: pos.timestamp,
              });
              var coords = [lat, lon];
              addPlacemarkAt(coords, acc, null);
              setStatus("Местоположение получено.");
            },
            function (err) {
              var msg = geoErrorMessage(err);
              log("getCurrentPosition.error", { code: err && err.code, message: err && err.message });
              setStatus(msg, true);
            },
            GEO_OPTIONS
          );
        }

        function enableManualPick() {
          if (!myMap) return;
          manualPickActive = true;
          setStatus("Нажмите на карту, чтобы поставить метку.");
          log("manualPick", "включён — ждём клик по карте");

          if (mapClickHandler) {
            myMap.events.remove("click", mapClickHandler);
            mapClickHandler = null;
          }

          mapClickHandler = function (e) {
            if (!manualPickActive) return;
            manualPickActive = false;
            var coords = e.get("coords");
            log("manualPick.click", coords);
            addPlacemarkAt(coords, null, "Выбрано на карте вручную");
            setStatus("Точка выбрана вручную.");
            if (mapClickHandler) {
              myMap.events.remove("click", mapClickHandler);
              mapClickHandler = null;
            }
            log("manualPick", "выключен после клика");
          };

          myMap.events.add("click", mapClickHandler);
        }

        function initMap() {
          log("ymaps.ready", "инициализация карты");
          myMap = new ymaps.Map(
            "map",
            {
              center: [55.75, 37.57],
              zoom: 10,
              controls: ["zoomControl", "fullscreenControl"],
            },
            { searchControlProvider: "yandex#search" }
          );
          log("map", "создана, центр по умолчанию Москва");

          document.getElementById("btnRetry").onclick = function () {
            log("ui", "кнопка «Повторить попытку»");
            manualPickActive = false;
            if (mapClickHandler && myMap) {
              myMap.events.remove("click", mapClickHandler);
              mapClickHandler = null;
            }
            requestGeolocation();
          };

          document.getElementById("btnManual").onclick = function () {
            log("ui", "кнопка «Выбрать на карте вручную»");
            enableManualPick();
          };

          requestGeolocation();
        }

        document.getElementById("platform").textContent = detectPlatformLabel();
        log("script", "старт страницы");

        ymaps.ready(function () {
          log("ymaps.ready", "callback");
          initMap();
        });
      })();
    </script>
  </body>
</html>
