<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JS API 2.1 — геолокация: iOS / PWA / fallback</title>
    <!-- Ключ подставляется при npm run build из VITE_YANDEX_MAPS_API_KEY -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      #panel {
        position: absolute;
        z-index: 1000;
        left: 10px;
        right: 10px;
        top: 10px;
        max-width: min(100%, 420px);
        padding: 12px 14px;
        background: rgba(15, 23, 42, 0.94);
        color: #e2e8f0;
        font-size: 13px;
        line-height: 1.45;
        border-radius: 10px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      }
      #panel.error {
        border-left: 4px solid #f87171;
      }
      #panel.success {
        border-left: 4px solid #4ade80;
      }
      #panel.warn {
        border-left: 4px solid #fbbf24;
      }
      #meta {
        margin-top: 8px;
        font-size: 11px;
        color: #94a3b8;
        word-break: break-word;
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #334155;
        color: #f1f5f9;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.primary {
        background: #2563eb;
      }
      button.danger {
        background: #7f1d1d;
      }
      #btnLastGeo {
        display: none;
        background: #0d9488;
      }
      #btnLastGeo.is-visible {
        display: inline-block;
      }

      /* Индикатор загрузки геолокации */
      #geo-loading {
        position: fixed;
        z-index: 2000;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        color: #f1f5f9;
        font-size: 14px;
        font-weight: 500;
        pointer-events: none;
      }
      #geo-loading.is-active {
        display: flex;
      }
      .geo-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(148, 163, 184, 0.35);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: geo-spin 0.75s linear infinite;
      }
      @keyframes geo-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .geo-loading-spinner {
          animation: none;
          border-top-color: #94a3b8;
        }
      }
    </style>
  </head>
  <body>
    <div id="geo-loading" aria-live="polite" aria-busy="false">
      <div class="geo-loading-spinner" aria-hidden="true"></div>
      <span>Определение местоположения…</span>
    </div>

    <div id="panel" role="status">
      <div id="msg">Загрузка карты…</div>
      <div id="meta"></div>
      <div class="btn-row">
        <button type="button" class="primary" id="btnRetry" disabled>Повторить попытку</button>
        <button type="button" id="btnManual" disabled>Выбрать на карте вручную</button>
        <button type="button" id="btnLastGeo">Использовать предыдущее местоположение</button>
      </div>
    </div>
    <div id="map"></div>

    <script>
      var LS_KEY = "yandex-maps-21-ios-pwa-last-geo-v1";
      var PWA_RACE_MS = 4000;

      function isIOS() {
        var ua = navigator.userAgent || "";
        if (/iPad|iPhone|iPod/.test(ua)) return true;
        if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return true;
        return false;
      }

      function isAndroid() {
        return /Android/i.test(navigator.userAgent || "");
      }

      function isStandalonePWA() {
        if (window.navigator.standalone === true) return true;
        try {
          if (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) return true;
        } catch (e) {}
        return false;
      }

      function isIOSPWA() {
        return isIOS() && isStandalonePWA();
      }

      /** Таймаут getCurrentPosition: iOS 20 с, Android и остальные 10 с */
      function geoTimeoutMs() {
        return isIOS() ? 20000 : 10000;
      }

      function getGeoOptions() {
        return {
          enableHighAccuracy: true,
          timeout: geoTimeoutMs(),
          maximumAge: 0,
        };
      }

      function ymapsGeoTimeoutMs() {
        return isIOS() ? 20000 : 10000;
      }

      function platformLabel() {
        if (isIOSPWA()) return "iOS PWA (standalone)";
        if (isIOS()) return "iOS Safari";
        if (isAndroid()) return "Android";
        return "Desktop / другое";
      }

      function msgGeolocationDeniedIOS() {
        return (
          "Доступ к геолокации запрещён. Включите в Настройках → Конфиденциальность → Службы геолокации → Safari " +
          "(или в настройках сайта для этого адреса), затем обновите страницу."
        );
      }

      function msgPositionUnavailableIOS() {
        return (
          "Не удалось определить местоположение. Попробуйте выйти на улицу или включить Wi‑Fi " +
          "(на iPhone это часто помогает GPS-службам)."
        );
      }

      function msgTimeoutUser() {
        return (
          "Поиск местоположения занял слишком много времени. Попробуйте обновить страницу и снова разрешить доступ " +
          "или нажмите «Повторить попытку»."
        );
      }

      function mapGeolocationError(err) {
        if (!err) return "Геолокация недоступна.";
        if (err.isRaceTimeout) {
          return (
            "Первая попытка в PWA прервана по времени (" +
            PWA_RACE_MS +
            " мс). Пробуем дальше по цепочке…"
          );
        }
        var c = err.code;
        if (c === 1) return msgGeolocationDeniedIOS();
        if (c === 2) return msgPositionUnavailableIOS();
        if (c === 3) return msgTimeoutUser();
        return err.message || "Ошибка геолокации";
      }

      var myMap = null;
      var userPlacemark = null;
      var manualClickListener = null;
      var busy = false;

      var elPanel = document.getElementById("panel");
      var elMsg = document.getElementById("msg");
      var elMeta = document.getElementById("meta");
      var btnRetry = document.getElementById("btnRetry");
      var btnManual = document.getElementById("btnManual");
      var btnLastGeo = document.getElementById("btnLastGeo");
      var elGeoLoading = document.getElementById("geo-loading");

      function setLoading(on) {
        if (on) {
          elGeoLoading.classList.add("is-active");
          elGeoLoading.setAttribute("aria-busy", "true");
        } else {
          elGeoLoading.classList.remove("is-active");
          elGeoLoading.setAttribute("aria-busy", "false");
        }
      }

      function setPanel(kind, text) {
        elMsg.textContent = text;
        elPanel.classList.remove("error", "success", "warn");
        if (kind === "error") elPanel.classList.add("error");
        else if (kind === "success") elPanel.classList.add("success");
        else if (kind === "warn") elPanel.classList.add("warn");
      }

      function setMeta(text) {
        elMeta.textContent = text || "";
      }

      function saveLastGeo(lat, lng, accuracyM, sourceLabel) {
        try {
          var rec = {
            lat: lat,
            lng: lng,
            accuracy: accuracyM != null && isFinite(accuracyM) ? accuracyM : null,
            source: sourceLabel || "",
            savedAt: Date.now(),
          };
          localStorage.setItem(LS_KEY, JSON.stringify(rec));
        } catch (e) {}
      }

      function loadLastGeo() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (!raw) return null;
          var o = JSON.parse(raw);
          if (typeof o.lat !== "number" || typeof o.lng !== "number") return null;
          if (!isFinite(o.lat) || !isFinite(o.lng)) return null;
          return o;
        } catch (e) {
          return null;
        }
      }

      function hasLastGeo() {
        return loadLastGeo() != null;
      }

      function updateLastGeoButtonVisibility(show) {
        if (show && hasLastGeo()) {
          btnLastGeo.classList.add("is-visible");
          btnLastGeo.disabled = false;
        } else {
          btnLastGeo.classList.remove("is-visible");
          btnLastGeo.disabled = true;
        }
      }

      function removeUserPlacemark() {
        if (userPlacemark && myMap) {
          myMap.geoObjects.remove(userPlacemark);
          userPlacemark = null;
        }
      }

      function addPlacemark(coords, accuracyM, sourceLabel, saveToStorage) {
        removeUserPlacemark();
        var accText =
          accuracyM != null && isFinite(accuracyM) ? Math.round(accuracyM) + " м" : "неизвестна";
        userPlacemark = new ymaps.Placemark(
          coords,
          {
            balloonContent:
              "<strong>" +
              (sourceLabel || "Точка") +
              "</strong><br>Координаты: " +
              coords[0].toFixed(6) +
              ", " +
              coords[1].toFixed(6) +
              "<br>Точность (accuracy): ±" +
              accText,
            hintContent: (sourceLabel || "Метка") + " ±" + accText,
          },
          { preset: "islands#blueCircleIcon", draggable: false }
        );
        myMap.geoObjects.add(userPlacemark);
        myMap.setCenter(coords, 16);
        userPlacemark.balloon.open();
        if (saveToStorage !== false) {
          saveLastGeo(coords[0], coords[1], accuracyM, sourceLabel);
        }
        updateLastGeoButtonVisibility(false);
      }

      /**
       * Обычный Promise вокруг getCurrentPosition (без внешнего race).
       */
      function geoGetPromise(options) {
        return new Promise(function (resolve, reject) {
          if (!navigator.geolocation) {
            reject({ code: 0, message: "API геолокации недоступен" });
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, options);
        });
      }

      /**
       * PWA iOS: Promise.race с флагом isTimedOut — ответ getCurrentPosition после таймаута игнорируется.
       */
      function geoGetPromiseWithPWARace(options, raceMs) {
        return new Promise(function (resolve, reject) {
          if (!navigator.geolocation) {
            reject({ code: 0, message: "API геолокации недоступен" });
            return;
          }
          var isTimedOut = false;
          var settled = false;

          var tid = setTimeout(function () {
            isTimedOut = true;
            if (!settled) {
              settled = true;
              reject({ code: 3, message: "pwa-race", isRaceTimeout: true });
            }
          }, raceMs);

          navigator.geolocation.getCurrentPosition(
            function (pos) {
              clearTimeout(tid);
              if (isTimedOut) return;
              if (!settled) {
                settled = true;
                resolve(pos);
              }
            },
            function (err) {
              clearTimeout(tid);
              if (isTimedOut) return;
              if (!settled) {
                settled = true;
                reject(err);
              }
            },
            options
          );
        });
      }

      function getNativePosition() {
        var opts = getGeoOptions();
        if (isIOSPWA()) {
          return geoGetPromiseWithPWARace(opts, PWA_RACE_MS);
        }
        return geoGetPromise(opts);
      }

      function queryGeolocationPermission() {
        return new Promise(function (resolve) {
          if (!navigator.permissions || !navigator.permissions.query) {
            resolve("unsupported");
            return;
          }
          navigator.permissions
            .query({ name: "geolocation" })
            .then(function (status) {
              resolve(status.state);
            })
            .catch(function () {
              resolve("unsupported");
            });
        });
      }

      function tryYmapsBrowserGeolocation() {
        return new Promise(function (resolve, reject) {
          if (typeof ymaps === "undefined" || !ymaps.geolocation || !ymaps.geolocation.get) {
            reject(new Error("ymaps.geolocation.get недоступен"));
            return;
          }
          ymaps.geolocation
            .get({
              provider: "browser",
              autoReverseGeocode: false,
              mapStateAutoApply: false,
              timeout: ymapsGeoTimeoutMs(),
            })
            .then(function (res) {
              var first = res.geoObjects && res.geoObjects.getLength && res.geoObjects.getLength() > 0;
              if (!first) {
                reject(new Error("Пустой ответ ymaps.geolocation"));
                return;
              }
              var geom = res.geoObjects.get(0).geometry;
              var c = geom.getCoordinates();
              resolve(c);
            })
            .catch(reject);
        });
      }

      function stopManualMode() {
        if (manualClickListener && myMap) {
          myMap.events.remove("click", manualClickListener);
          manualClickListener = null;
        }
        btnManual.disabled = false;
        btnManual.textContent = "Выбрать на карте вручную";
      }

      function startManualMode() {
        stopManualMode();
        setLoading(false);
        setPanel("warn", "Нажмите на карту, чтобы поставить метку.");
        btnManual.textContent = "Отмена ручного выбора";
        btnManual.disabled = false;
        manualClickListener = function (e) {
          var c = e.get("coords");
          stopManualMode();
          addPlacemark(c, null, "Вручную на карте", true);
          setPanel("success", "Метка установлена вручную.");
          setMeta(platformLabel());
        };
        myMap.events.add("click", manualClickListener);
      }

      function enableFallbackButtons() {
        btnRetry.disabled = false;
        btnManual.disabled = false;
      }

      function disableFallbackButtons() {
        btnRetry.disabled = true;
        btnManual.disabled = true;
      }

      async function runGeolocation() {
        if (busy || !myMap) return;
        busy = true;
        disableFallbackButtons();
        updateLastGeoButtonVisibility(false);
        stopManualMode();
        setLoading(true);

        setMeta("Платформа: " + platformLabel());
        setPanel("", "Проверка разрешения и запрос координат…");

        if (!navigator.geolocation) {
          setPanel("error", "В этом браузере нет Geolocation API.");
          setLoading(false);
          enableFallbackButtons();
          updateLastGeoButtonVisibility(true);
          busy = false;
          return;
        }

        var perm = await queryGeolocationPermission();
        if (perm === "denied") {
          setPanel("error", msgGeolocationDeniedIOS());
          setLoading(false);
          enableFallbackButtons();
          updateLastGeoButtonVisibility(true);
          busy = false;
          return;
        }

        var nativeErr = null;
        try {
          var pos = await getNativePosition();
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          var acc = pos.coords.accuracy;
          addPlacemark([lat, lng], acc, "navigator.geolocation", true);
          setPanel(
            "success",
            isIOSPWA()
              ? "Координаты получены (нативный API; в PWA первая фаза ограничена " +
                  PWA_RACE_MS +
                  " мс, при успехе — полный ответ; timeout опций iOS: " +
                  geoTimeoutMs() +
                  " мс)."
              : "Координаты получены через navigator.geolocation (timeout: " + geoTimeoutMs() + " мс)."
          );
          setMeta(platformLabel() + " · источник: нативный API");
          setLoading(false);
          busy = false;
          return;
        } catch (e) {
          nativeErr = e;
        }

        var errText = mapGeolocationError(nativeErr);
        setPanel("warn", errText + " Пробуем ymaps.geolocation.get (browser)…");

        try {
          var yc = await tryYmapsBrowserGeolocation();
          addPlacemark(yc, null, "ymaps.geolocation (browser)", true);
          setPanel("success", "Координаты получены через Яндекс.Карты (provider: browser).");
          setMeta(platformLabel() + " · источник: ymaps.geolocation · timeout: " + ymapsGeoTimeoutMs() + " мс");
          setLoading(false);
          busy = false;
          return;
        } catch (e2) {
          setPanel(
            "error",
            errText + " Резервный способ Яндекса не сработал. Выберите точку на карте, предыдущее место или повторите попытку."
          );
          setMeta(platformLabel() + " · fallback: ручной выбор / кэш");
        }

        setLoading(false);
        enableFallbackButtons();
        updateLastGeoButtonVisibility(true);
        busy = false;
      }

      function applyLastSavedGeo() {
        var o = loadLastGeo();
        if (!o || !myMap) return;
        var acc = o.accuracy != null && isFinite(o.accuracy) ? o.accuracy : null;
        var src = o.source ? "Сохранено: " + o.source : "Сохранённая точка";
        addPlacemark([o.lat, o.lng], acc, src, false);
        var ageMin = o.savedAt ? Math.round((Date.now() - o.savedAt) / 60000) : null;
        setPanel(
          "success",
          "Показано предыдущее местоположение" +
            (ageMin != null && ageMin >= 0 ? " (сохранено ~" + ageMin + " мин назад)." : ".")
        );
        setMeta(platformLabel() + " · из localStorage");
        setLoading(false);
      }

      btnRetry.addEventListener("click", function () {
        void runGeolocation();
      });
      btnManual.addEventListener("click", function () {
        if (manualClickListener) {
          stopManualMode();
          setPanel("", "Ручной режим отменён.");
          return;
        }
        if (!myMap) return;
        startManualMode();
      });
      btnLastGeo.addEventListener("click", function () {
        applyLastSavedGeo();
      });

      ymaps.ready(function () {
        if (
          location.protocol !== "https:" &&
          location.hostname !== "localhost" &&
          location.hostname !== "127.0.0.1"
        ) {
          setPanel("error", "Для геолокации нужен HTTPS (или localhost).");
          enableFallbackButtons();
          updateLastGeoButtonVisibility(true);
          return;
        }

        myMap = new ymaps.Map(
          "map",
          { center: [55.76, 37.64], zoom: 10, controls: ["zoomControl", "fullscreenControl"] },
          { suppressMapOpenBlock: true }
        );

        setPanel("", "Карта готова. Запрашиваем геолокацию…");
        setMeta("Платформа: " + platformLabel() + " · getCurrentPosition timeout: iOS " + 20000 + " мс / прочие " + 10000 + " мс");
        void runGeolocation();
      });
    </script>
  </body>
</html>
