<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Фиксированная метка геолокации — API 2.1</title>
    <!-- Ключ подставляется при npm run build из VITE_YANDEX_MAPS_API_KEY -->
    <script
      src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU"
      type="text/javascript"
    ></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      #toolbar {
        flex-shrink: 0;
        z-index: 1000;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
      }
      #toolbar button {
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
      }
      #toolbar button:hover:not(:disabled) {
        background: #f5f5f5;
      }
      #toolbar button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        width: 100%;
        font-size: 13px;
        color: #333;
        min-height: 1.2em;
      }
      #status.error {
        color: #c00;
      }
      #map {
        flex: 1;
        min-height: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button type="button" id="btnRefresh">Обновить местоположение</button>
      <div id="status"></div>
    </div>
    <div id="map"></div>

    <script>
      (function () {
        "use strict";

        var CONSOLE_RED = "color:red;font-weight:bold;font-size:14px;";
        var RESTORE_MSG = "БЫЛ ПОПЫТ ПЕРЕМЕЩЕНИЯ, МЕТКА ВОССТАНОВЛЕНА";

        var GEO_OPTIONS = {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 0,
        };

        var myMap = null;

        /** @type {[number, number] | null} широта, долгота */
        let fixedCoords = null;
        let fixedAccuracy = null;
        /** @type {ymaps.Placemark | null} */
        let currentPlacemark = null;
        let checkInterval = null;
        let verifyTimeout = null;

        function logRed(text) {
          console.log("%c" + text, CONSOLE_RED);
        }

        /** Расстояние между двумя точками [lat, lon] в метрах */
        function getDistance(a, b) {
          var R = 6371000;
          var lat1 = (a[0] * Math.PI) / 180;
          var lat2 = (b[0] * Math.PI) / 180;
          var dLat = ((b[0] - a[0]) * Math.PI) / 180;
          var dLon = ((b[1] - a[1]) * Math.PI) / 180;
          var sinDLat = Math.sin(dLat / 2);
          var sinDLon = Math.sin(dLon / 2);
          var h = sinDLat * sinDLat + Math.cos(lat1) * Math.cos(lat2) * sinDLon * sinDLon;
          return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
        }

        function setStatus(text, isError) {
          var el = document.getElementById("status");
          el.textContent = text || "";
          el.className = isError ? "error" : "";
        }

        function stopGuards() {
          if (checkInterval !== null) {
            clearInterval(checkInterval);
            checkInterval = null;
          }
          if (verifyTimeout !== null) {
            clearTimeout(verifyTimeout);
            verifyTimeout = null;
          }
        }

        function removeCurrentPlacemark() {
          if (currentPlacemark && myMap) {
            try {
              myMap.geoObjects.remove(currentPlacemark);
            } catch (e) {
              console.warn("removeCurrentPlacemark", e);
            }
          }
          currentPlacemark = null;
        }

        /** Новая метка только из fixedCoords (не из result.geoObjects) */
        function createPlacemarkFromFixed() {
          if (!myMap || !fixedCoords) return null;

          var lat = fixedCoords[0];
          var lon = fixedCoords[1];
          var accLine =
            typeof fixedAccuracy === "number" && !isNaN(fixedAccuracy)
              ? "Точность: ±" + Math.round(fixedAccuracy) + " м<br>"
              : "";

          return new ymaps.Placemark(
            fixedCoords,
            {
              balloonContentBody:
                "📍 ФИКСИРОВАННОЕ положение<br>" +
                "Координаты: " +
                lat.toFixed(6) +
                ", " +
                lon.toFixed(6) +
                "<br>" +
                accLine +
                "🔒 Защита от прыжков активна<br>" +
                "🔒 Координаты зафиксированы и не обновляются",
              iconCaption: "📍 🔒",
            },
            {
              preset: "islands#redCircleIcon",
              draggable: false,
            }
          );
        }

        function mountPlacemark(openBalloon) {
          removeCurrentPlacemark();
          currentPlacemark = createPlacemarkFromFixed();
          if (!currentPlacemark) return;
          myMap.geoObjects.add(currentPlacemark);
          if (openBalloon) {
            currentPlacemark.balloon.open();
          }
        }

        /**
         * Если метка уехала дальше minMeters от fixedCoords — пересоздаём на fixedCoords.
         * @param {number} minMeters порог (10 — периодическая проверка; 1 — разовая через 6 с)
         */
        function restoreFixedPosition(minMeters) {
          if (!fixedCoords || !currentPlacemark || !myMap) return;

          var currentCoords;
          try {
            currentCoords = currentPlacemark.geometry.getCoordinates();
          } catch (e) {
            return;
          }
          if (!currentCoords || currentCoords.length < 2) return;

          var distance = getDistance(currentCoords, fixedCoords);
          if (distance <= minMeters) return;

          console.warn(
            "⚠️ Метка прыгнула на " + Math.round(distance) + "м! Возвращаем..."
          );
          logRed(RESTORE_MSG);

          myMap.geoObjects.remove(currentPlacemark);

          currentPlacemark = createPlacemarkFromFixed();
          if (currentPlacemark) {
            myMap.geoObjects.add(currentPlacemark);
          }

          console.log("✅ Метка восстановлена на правильных координатах");
        }

        function startGuards() {
          stopGuards();

          verifyTimeout = window.setTimeout(function () {
            verifyTimeout = null;
            restoreFixedPosition(1);
          }, 6000);

          checkInterval = window.setInterval(function () {
            restoreFixedPosition(10);
          }, 2000);
        }

        /** Единственный путь к геолокации, кроме кнопки «Обновить» */
        function requestGeolocationOnce() {
          if (!navigator.geolocation) {
            setStatus("Геолокация не поддерживается браузером", true);
            return;
          }

          var btn = document.getElementById("btnRefresh");
          btn.disabled = true;
          setStatus("Получаем координаты (один запрос)…");

          navigator.geolocation.getCurrentPosition(
            function (pos) {
              var lat = pos.coords.latitude;
              var lon = pos.coords.longitude;
              var acc = pos.coords.accuracy;
              pos = null;

              fixedCoords = [lat, lon];
              fixedAccuracy = acc;

              mountPlacemark(true);

              if (myMap) {
                myMap.setCenter(fixedCoords, 16, { duration: 200 });
              }

              startGuards();

              setStatus("Метка зафиксирована. Обновление только по кнопке.");
              btn.disabled = false;
            },
            function (err) {
              var msg = "Ошибка геолокации";
              if (err && err.code === 1) msg = "Разрешите доступ к геолокации";
              else if (err && err.code === 2) msg = "Позиция недоступна";
              else if (err && err.code === 3) msg = "Таймаут";
              setStatus(msg, true);
              btn.disabled = false;
            },
            GEO_OPTIONS
          );
        }

        /** Явное обновление локации: останавливаем проверку и новый getCurrentPosition */
        function updateLocation() {
          stopGuards();
          removeCurrentPlacemark();
          fixedCoords = null;
          fixedAccuracy = null;
          requestGeolocationOnce();
        }

        ymaps.ready(function () {
          myMap = new ymaps.Map(
            "map",
            {
              center: [55.75, 37.57],
              zoom: 10,
              controls: ["zoomControl", "fullscreenControl"],
            },
            { searchControlProvider: "yandex#search" }
          );

          document.getElementById("btnRefresh").onclick = updateLocation;

          requestGeolocationOnce();
        });
      })();
    </script>
  </body>
</html>
