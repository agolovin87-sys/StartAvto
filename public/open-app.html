<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="application-name" content="StartAvto" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="StartAvto" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <title>Открытие StartAvto</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta property="og:title" content="StartAvto" />
    <meta property="og:description" content="Открыть приложение автошколы" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StartAvto" />
    <meta property="og:image" content="https://startavto-cf419.web.app/app-icon-v6.png" />
    <meta property="og:image:secure_url" content="https://startavto-cf419.web.app/app-icon-v6.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://startavto-cf419.web.app/open-app.html" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="StartAvto" />
    <meta name="twitter:description" content="Открыть приложение автошколы" />
    <meta name="twitter:image" content="https://startavto-cf419.web.app/app-icon-v6.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/app-icon-192.png" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .box {
        width: min(92vw, 420px);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 14px;
        padding: 16px;
        background: rgba(30, 41, 59, 0.8);
      }
      a {
        color: #7dd3fc;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border-radius: 10px;
        padding: 0 14px;
        border: 1px solid rgba(125, 211, 252, 0.45);
        background: rgba(14, 165, 233, 0.18);
        color: #e0f2fe;
        text-decoration: none;
        font-weight: 600;
      }
      .btn-ghost {
        border-color: rgba(148, 163, 184, 0.5);
        background: rgba(148, 163, 184, 0.1);
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .head img {
        width: 24px;
        height: 24px;
        border-radius: 6px;
      }
      .head strong {
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="head">
        <img src="/app-icon-192.png" alt="" />
        <strong>StartAvto</strong>
      </div>
      <p id="status">Открываем приложение…</p>
      <p>
        Если переход не сработал, нажмите:
        <a id="fallback" href="https://startavto-cf419.web.app/install">Открыть StartAvto</a>
      </p>
      <div class="actions">
        <a id="installBtn" class="btn" href="https://startavto-cf419.web.app/install">Установить</a>
        <a id="chromeBtn" class="btn btn-ghost" href="#" hidden>Открыть в Chrome</a>
      </div>
    </div>

    <script>
      (function () {
        var target = "https://startavto-cf419.web.app/install";
        var ua = navigator.userAgent || "";
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var isChrome = /Chrome\/|CriOS\//i.test(ua) && !/EdgA\/|OPR\//i.test(ua);
        var status = document.getElementById("status");
        var fallback = document.getElementById("fallback");
        var installBtn = document.getElementById("installBtn");
        var chromeBtn = document.getElementById("chromeBtn");
        if (fallback) fallback.href = target;
        if (installBtn) installBtn.href = target;
        var androidTarget = target + "?tab=android";
        var iosTarget = target + "?tab=ios";

        if (isAndroid) {
          if (installBtn) installBtn.href = androidTarget;
          var intentUrl =
            "intent://startavto-cf419.web.app/install#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
            encodeURIComponent(androidTarget) +
            ";end";
          if (chromeBtn) {
            chromeBtn.hidden = false;
            chromeBtn.href = intentUrl;
          }
          if (!isChrome) {
            if (status) status.textContent = "Android: нажмите «Установить» или откройте в Chrome.";
            return;
          }
          if (status) status.textContent = "Android (Chrome): нажмите «Установить».";
          return;
        }

        if (isIOS) {
          if (installBtn) installBtn.href = iosTarget;
          if (status) status.textContent = "iOS: нажмите «Установить» и следуйте шагам для Safari.";
          return;
        }

        if (status) status.textContent = "Нажмите «Установить», чтобы перейти к установке приложения.";
      })();
    </script>
  </body>
</html>
