<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Открытие StartAvto</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .box {
        width: min(92vw, 420px);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 14px;
        padding: 16px;
        background: rgba(30, 41, 59, 0.8);
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p id="status">Открываем приложение…</p>
      <p>
        Если переход не сработал, нажмите:
        <a id="fallback" href="https://startavto-cf419.web.app/install">Открыть StartAvto</a>
      </p>
    </div>

    <script>
      (function () {
        var target = "https://startavto-cf419.web.app/install";
        var ua = navigator.userAgent || "";
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var status = document.getElementById("status");
        var fallback = document.getElementById("fallback");
        if (fallback) fallback.href = target;

        if (isAndroid) {
          if (status) status.textContent = "Android: пытаемся открыть через Google Chrome…";
          var intentUrl =
            "intent://startavto-cf419.web.app/install#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
            encodeURIComponent(target) +
            ";end";
          window.location.replace(intentUrl);
          return;
        }

        if (isIOS) {
          if (status) status.textContent = "iOS: открываем ссылку (Safari)…";
          window.location.replace(target);
          return;
        }

        if (status) status.textContent = "Открываем StartAvto…";
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
