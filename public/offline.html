<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Нет соединения — StartAvto</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: radial-gradient(circle at 50% 20%, #1e293b 0%, #0f172a 55%);
        color: #e2e8f0;
        padding: 24px;
      }
      .card {
        max-width: 400px;
        text-align: center;
      }
      h1 {
        font-size: 1.35rem;
        margin: 16px 0 8px;
      }
      p {
        color: #94a3b8;
        line-height: 1.45;
        margin: 0 0 20px;
      }
      button {
        display: inline-block;
        margin: 6px;
        padding: 12px 18px;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
      }
      .primary {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #fff;
      }
      .secondary {
        background: rgba(148, 163, 184, 0.25);
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg viewBox="0 0 24 24" width="56" height="56" fill="#f87171" aria-hidden>
        <path
          d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7l11.63 14.49L12 22l.01-.01-.02-.02L19.35 13.2l2.54 2.54 1.27-1.27L17.03 12.4z"
        />
      </svg>
      <h1>Нет соединения</h1>
      <p>Проверьте подключение к интернету и попробуйте снова.</p>
      <div>
        <button type="button" class="primary" onclick="location.reload()">Повторить</button>
        <button type="button" class="secondary" onclick="location.href='/app'">
          Перейти в офлайн-режим
        </button>
      </div>
    </div>
  </body>
</html>
